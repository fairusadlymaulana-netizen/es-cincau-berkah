<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Es Cincau Berkah</title>

<style>
body{
font-family:Arial;
background:#f1fff1;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px #ccc;
}

h1{
text-align:center;
color:#1b8f3a;
}

input, select, button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#1b8f3a;
color:white;
font-weight:bold;
border:none;
}

.hasil{
background:#eaffea;
padding:15px;
margin-top:15px;
border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🥤 Kasir Es Cincau Berkah</h1>

<label>Pilih Menu</label>
<select id="menu">
<option value="4000">Es Cincau Kecil - Rp4.000</option>
<option value="7000">Es Cincau Besar - Rp7.000</option>
</select>

<label>Jumlah</label>
<input type="number" id="jumlah" value="1">

<label>Uang Bayar</label>
<input type="number" id="bayar" placeholder="Masukkan uang">

<button onclick="hitung()">Hitung</button>

<div class="hasil" id="hasil">
Total: Rp0
</div>

</div>


<script>
function hitung(){

let harga=document.getElementById("menu").value;
let jumlah=document.getElementById("jumlah").value;
let bayar=document.getElementById("bayar").value;

let total=harga*jumlah;
let kembali=bayar-total;

document.getElementById("hasil").innerHTML=
"Total: Rp"+total.toLocaleString()+
"<br>Kembalian: Rp"+kembali.toLocaleString();

}
</script>

</body>
</html>
