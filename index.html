<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es Cincau Hijau Berkah</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2fdf4;
}
.header{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:20px;
}
.container{
    max-width:500px;
    margin:auto;
    padding:15px;
}
.card{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}
input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2e7d32;
    color:white;
    font-size:18px;
    cursor:pointer;
}
.hasil{
    font-size:18px;
    margin-top:10px;
}
.progress{
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}
.bar{
    height:100%;
    width:0%;
    background:#4CAF50;
}
</style>

</head>
<body>

<div class="header">
<h1>🥤 Es Cincau Hijau Berkah</h1>
<p>Dashboard Penjualan</p>
</div>

<div class="container">

<div class="card">
<label>Jumlah Gelas Terjual</label>
<input type="number" id="gelas" value="0">

<label>Harga per Gelas</label>
<input type="number" id="harga" value="5000">

<label>Modal per Gelas</label>
<input type="number" id="modal" value="2500">

<button onclick="hitung()">Hitung</button>
</div>

<div class="card">
<div class="hasil" id="omzet">Omzet : Rp0</div>
<div class="hasil" id="modalTotal">Modal : Rp0</div>
<div class="hasil" id="laba">Laba : Rp0</div>
</div>

<div class="card">
<h3>Target 100 Gelas</h3>
<div class="progress">
<div class="bar" id="bar"></div>
</div>
<p id="target">0 / 100 Gelas</p>
</div>

</div>

<script>
function hitung(){

let gelas=parseInt(document.getElementById("gelas").value)||0;
let harga=parseInt(document.getElementById("harga").value)||0;
let modal=parseInt(document.getElementById("modal").value)||0;

let omzet=gelas*harga;
let modalTotal=gelas*modal;
let laba=omzet-modalTotal;

document.getElementById("omzet").innerHTML="Omzet : Rp"+omzet.toLocaleString("id-ID");
document.getElementById("modalTotal").innerHTML="Modal : Rp"+modalTotal.toLocaleString("id-ID");
document.getElementById("laba").innerHTML="Laba : Rp"+laba.toLocaleString("id-ID");

let persen=(gelas/100)*100;
if(persen>100) persen=100;

document.getElementById("bar").style.width=persen+"%";
document.getElementById("target").innerHTML=gelas+" / 100 Gelas";

}
</script>

</body>
</html>
